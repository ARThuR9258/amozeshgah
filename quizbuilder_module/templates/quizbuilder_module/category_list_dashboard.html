{% extends 'layout/_master.html' %}
{% block content %}
<div class="da-page">
    <div class="da-page-header">
        <h1 class="da-page-title">دسته‌بندی سوالات</h1>
        <a href="{% url 'quizbuilder:dashboard_category_add' %}" class="da-btn da-btn-primary"><i class="fas fa-plus"></i> دسته جدید</a>
    </div>
    <div class="da-card">
        <table class="table da-table">
            <thead><tr><th>نام</th><th>slug</th><th>فعال</th><th></th></tr></thead>
            <tbody>
                {% for c in categories %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td>{{ c.slug }}</td>
                    <td>{% if c.is_active %}بله{% else %}خیر{% endif %}</td>
                    <td><a href="{% url 'quizbuilder:dashboard_category_edit' c.pk %}" class="da-btn da-btn-sm da-btn-outline">ویرایش</a></td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-muted text-center">دسته‌ای نیست</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
