<div class="da-page-header">
    <div class="da-page-header-main">
        <nav class="da-breadcrumb" aria-label="breadcrumb">
            <a href="{% url 'dashboard' %}"><i class="fas fa-home"></i></a>
            {% if breadcrumb_parent %}
            <span class="da-breadcrumb-sep"><i class="fas fa-chevron-left"></i></span>
            <a href="{{ breadcrumb_parent_url }}">{{ breadcrumb_parent }}</a>
            {% endif %}
            <span class="da-breadcrumb-sep"><i class="fas fa-chevron-left"></i></span>
            <span>{{ page_title }}</span>
        </nav>
        <h1 class="da-page-title">
            {% if page_icon %}<i class="fas {{ page_icon }}"></i>{% endif %}
            {{ page_title }}
        </h1>
        {% if page_subtitle %}<p class="da-page-subtitle">{{ page_subtitle }}</p>{% endif %}
    </div>
    {% if page_actions %}
    <div class="da-page-actions">
        {{ page_actions|safe }}
    </div>
    {% endif %}
</div>
